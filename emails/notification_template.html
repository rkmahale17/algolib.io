<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #334155; }
        .wrapper { width: 100%; padding: 40px 0; }
        .card { max-width: 580px; margin: 0 auto; background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .status-bar { height: 4px; background: linear-gradient(90deg, #7c3aed, #2563eb); }
        .card-body { padding: 40px; }
        .logo { font-size: 18px; font-weight: 800; color: #7c3aed; margin-bottom: 32px; display: inline-block; text-decoration: none; }
        .alert-icon { width: 48px; height: 48px; background: #f5f3ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        h2 { font-size: 20px; font-weight: 700; color: #0f172a; margin: 0 0 16px 0; }
        p { font-size: 15px; line-height: 1.6; margin: 0 0 24px 0; }
        .data-table { width: 100%; background: #f8fafc; border-radius: 8px; border-collapse: separate; border-spacing: 0; margin-bottom: 24px; border: 1px solid #eee; }
        .data-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #eee; }
        .data-table td:first-child { font-weight: 600; color: #64748b; width: 120px; }
        .btn { display: inline-block; background: #7c3aed; color: #ffffff !important; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 14px; }
        .footer { text-align: center; padding-top: 24px; font-size: 12px; color: #94a3b8; }
        
        @media (prefers-color-scheme: dark) {
            body { background-color: #020617; }
            .card { background-color: #0f172a; border-color: #1e293b; }
            h2 { color: #f8fafc; }
            p { color: #94a3b8; }
            .data-table { background: #1e293b; border-color: #334155; }
            .data-table td { border-bottom-color: #334155; color: #cbd5e1; }
            .alert-icon { background: #1e1b4b; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="status-bar"></div>
            <div class="card-body">
                <a href="https://rulcode.com" class="logo">rulcode</a>
                <div class="alert-icon">
                    <img src="https://img.icons8.com/isometric/48/7c3aed/bell-range.png" width="32" height="32" alt="Alert">
                </div>
                <h2>Project Update: {{project_name}}</h2>
                <p>Hello! There's been a new activity on your project that requires your attention.</p>
                
                <table class="data-table">
                    <tr>
                        <td>Activity</td>
                        <td>New Algorithm Visualization Published</td>
                    </tr>
                    <tr>
                        <td>Author</td>
                        <td>{{user_name}}</td>
                    </tr>
                    <tr>
                        <td>Time</td>
                        <td>{{timestamp}}</td>
                    </tr>
                </table>
                
                <a href="{{activity_url}}" class="btn">View Activity</a>
                
                <div class="footer">
                    Sent via rulcode Notifications &bull; <a href="#" style="color: #7c3aed; text-decoration: none;">Manage Settings</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
